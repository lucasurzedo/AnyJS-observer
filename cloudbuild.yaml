steps:
- id: get-secrets-teste
  name: gcr.io/cloud-builders/gcloud
  entrypoint: /bin/bash
  args: [ '-c', "gcloud secrets versions access latest --secret=secret-test > teste.txt" ]

- id: sett-secrets-teste
  name: gcr.io/cloud-builders/gcloud
  entrypoint: '/bin/bash'
  args: [ '-c', "gcloud secrets versions add secret-test-1 --data-file="teste.txt"" ]

options:
  substitutionOption: ALLOW_LOOSE

images:
  - 'gcr.io/$PROJECT_ID/github.com/lucasurzedo/anyjs-observer:latest'

substitutions:
  _REPO_OWNER: lucas
  _PUSH: push
