steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - '--no-cache'
      - '-t'
      - 'gcr.io/$PROJECT_ID/github.com/$_REPO_OWNER/anyjs-observer:latest'
      - '.'
    id: Build
  - name: gcr.io/cloud-builders/docker
    args: ['$_PUSH, 'gcr.io/$PROJECT_ID/github.com/lucasurzedo/anyjs-observer:latest']
    id: Push

options:
  substitutionOption: ALLOW_LOOSE

images:
  - 'gcr.io/$PROJECT_ID/github.com/lucasurzedo/anyjs-observer:latest'

substitutions:
  _REPO_OWNER: lucasurzedo
  _PUSH: push
  